<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
      font-family: 'Inter', sans-serif;
    }

    .headline {
      font-size: 72px;
      font-weight: 900;
      color: white;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .subtext {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      text-align: center;
      line-height: 1.5;
      max-width: 700px;
    }

    .badge {
      position: absolute;
      top: 60px;
      right: 60px;
      background: white;
      color: #764ba2;
      font-size: 20px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .footer {
      position: absolute;
      bottom: 60px;
      font-size: 22px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="badge">Nouveau</div>
    <h1 class="headline">Votre Titre<br>Accrocheur Ici</h1>
    <p class="subtext">Une description concise et engageante qui donne envie d'en savoir plus sur votre offre.</p>
    <div class="footer">@votremarque</div>
  </div>
</body>
</html>
