<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; }

    .canvas {
      width: 1080px;
      height: 1920px;
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 80px;
      position: relative;
      font-family: 'Inter', sans-serif;
    }

    .top-label {
      position: absolute;
      top: 120px;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .emoji-icon {
      font-size: 80px;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 64px;
      font-weight: 900;
      color: white;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 30px;
    }

    .body-text {
      font-size: 26px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      line-height: 1.6;
      max-width: 750px;
    }

    .cta {
      position: absolute;
      bottom: 200px;
      background: white;
      color: #302b63;
      font-size: 22px;
      font-weight: 700;
      padding: 20px 60px;
      border-radius: 60px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .swipe-hint {
      position: absolute;
      bottom: 120px;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="top-label">Story Template</div>
    <div class="emoji-icon">&#x1F680;</div>
    <h1 class="headline">Titre Principal de Votre Story</h1>
    <p class="body-text">Ajoutez ici un texte descriptif court qui capte l'attention de votre audience en quelques secondes.</p>
    <div class="cta">En Savoir Plus</div>
    <div class="swipe-hint">Swipe up</div>
  </div>
</body>
</html>
