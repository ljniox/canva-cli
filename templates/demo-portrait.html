<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant:ital,wght@0,600;1,600&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #0A0A0C;
      position: relative;
      overflow: hidden;
    }

    /* ── Photo: right side, full height, masked ── */
    .photo-container {
      position: absolute;
      top: 0;
      right: 0;
      width: 620px;
      height: 1080px;
      overflow: hidden;
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: contrast(1.1) brightness(0.95);
    }

    /* Gradient overlay on photo — left fade into dark */
    .photo-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #0A0A0C 0%, rgba(10,10,12,0.6) 35%, transparent 70%);
      z-index: 2;
    }

    /* Bottom fade on photo */
    .photo-container::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(0deg, #0A0A0C 0%, transparent 100%);
      z-index: 2;
    }

    /* ── Film grain overlay ── */
    .grain {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.35;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Diagonal decorative lines ── */
    .deco-line {
      position: absolute;
      height: 1px;
      background: rgba(201, 168, 76, 0.2);
      z-index: 5;
    }
    .deco-line-1 {
      width: 1800px; top: 200px; left: -200px;
      transform: rotate(-25deg);
    }
    .deco-line-2 {
      width: 1800px; top: 650px; left: -200px;
      transform: rotate(-25deg);
    }

    /* ── Accent shape ── */
    .accent-circle {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: 50%;
      top: -80px;
      left: -80px;
      z-index: 3;
    }

    /* ── Top label ── */
    .top-label {
      position: absolute;
      top: 60px;
      left: 80px;
      z-index: 8;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #C9A84C;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    /* ── Hero headline ── */
    .headline {
      position: absolute;
      top: 130px;
      left: 80px;
      z-index: 8;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 160px;
      line-height: 0.88;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: -2px;
    }

    .headline .accent {
      color: #C9A84C;
    }

    /* ── Serif italic subline ── */
    .subline {
      position: absolute;
      top: 530px;
      left: 80px;
      z-index: 8;
      font-family: 'Cormorant', serif;
      font-style: italic;
      font-size: 34px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.5;
      max-width: 420px;
    }

    /* ── Separator line ── */
    .sep {
      position: absolute;
      top: 500px;
      left: 80px;
      width: 60px;
      height: 2px;
      background: #C9A84C;
      z-index: 8;
    }

    /* ── Bottom info bar ── */
    .bottom-info {
      position: absolute;
      bottom: 60px;
      left: 80px;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .bottom-info .tag {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .bottom-info .divider {
      width: 30px;
      height: 1px;
      background: rgba(201, 168, 76, 0.3);
    }

    /* ── Vertical text ── */
    .vertical-text {
      position: absolute;
      right: 40px;
      bottom: 200px;
      z-index: 8;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 6px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Decorations -->
    <div class="accent-circle"></div>
    <div class="deco-line deco-line-1"></div>
    <div class="deco-line deco-line-2"></div>

    <!-- Photo -->
    <div class="photo-container">
      <img src="/assets/images/portrait-cutout.png" alt="">
    </div>

    <!-- Typography -->
    <div class="top-label">Portfolio 2025</div>

    <h1 class="headline">
      Creez<br>
      Votre<br>
      <span class="accent">Impact</span>
    </h1>

    <div class="sep"></div>

    <p class="subline">
      L'art de raconter votre histoire a travers un design qui fait la difference.
    </p>

    <!-- Bottom -->
    <div class="bottom-info">
      <span class="tag">Design</span>
      <span class="divider"></span>
      <span class="tag">Strategie</span>
      <span class="divider"></span>
      <span class="tag">Impact</span>
    </div>

    <div class="vertical-text">Canva-CLI</div>

    <!-- Grain -->
    <div class="grain"></div>
  </div>
</body>
</html>
