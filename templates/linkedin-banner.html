<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1584px; height: 396px; overflow: hidden; }

    .canvas {
      width: 1584px;
      height: 396px;
      background: linear-gradient(90deg, #0a0a0a 0%, #1a1a2e 40%, #16213e 100%);
      display: flex;
      align-items: center;
      padding: 0 100px;
      position: relative;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .text-block {
      z-index: 2;
    }

    .name {
      font-size: 52px;
      font-weight: 900;
      color: white;
      margin-bottom: 8px;
    }

    .title {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 20px;
      font-weight: 600;
      color: #667eea;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .decoration {
      position: absolute;
      right: -50px;
      top: -50px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
    }

    .decoration-2 {
      position: absolute;
      right: 200px;
      bottom: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(118, 75, 162, 0.12) 0%, transparent 70%);
    }

    .dots {
      position: absolute;
      right: 100px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      grid-template-columns: repeat(5, 10px);
      gap: 16px;
      z-index: 1;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .dot:nth-child(3), .dot:nth-child(7), .dot:nth-child(13), .dot:nth-child(18) {
      background: rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="text-block">
      <div class="name">Votre Nom</div>
      <div class="title">Votre Titre Professionnel | Entreprise</div>
      <div class="tagline">Innovation &bull; Leadership &bull; Impact</div>
    </div>
    <div class="decoration"></div>
    <div class="decoration-2"></div>
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</body>
</html>
